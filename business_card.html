<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>명함 - 돌아와요</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f0f0;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }

    .card {
      position: relative;
      width: 420px;
      border-radius: 20px;
      overflow: hidden;
      background: #2c3d35;
    }

    .card svg.bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 2rem 2.25rem;
    }

    .dept {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: #a8c9bb;
      margin: 0 0 0.75rem;
      text-transform: uppercase;
    }

    .name {
      font-size: 32px;
      font-weight: 500;
      margin: 0 0 1.75rem;
      color: #e8eeeb;
      letter-spacing: -0.02em;
    }

    .divider {
      border-top: 0.5px solid rgba(170,200,185,0.2);
      padding-top: 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .contact-row span {
      font-size: 14px;
      color: #cce0d8;
    }
  </style>
</head>
<body>
  <div class="card">
    <svg class="bg" viewBox="0 0 420 240" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <circle cx="380" cy="30" r="90" fill="#3a5045" opacity="0.7"/>
      <circle cx="30" cy="220" r="100" fill="#354a3e" opacity="0.6"/>
      <circle cx="200" cy="130" r="60" fill="#384d42" opacity="0.35"/>
      <line x1="0" y1="200" x2="420" y2="60" stroke="#7aab94" stroke-width="0.4" opacity="0.3"/>
      <line x1="0" y1="240" x2="420" y2="100" stroke="#7aab94" stroke-width="0.3" opacity="0.18"/>
      <line x1="100" y1="0" x2="100" y2="240" stroke="#7aab94" stroke-width="0.3" opacity="0.12"/>
      <line x1="320" y1="0" x2="320" y2="240" stroke="#7aab94" stroke-width="0.3" opacity="0.12"/>
      <rect x="0" y="0" width="4" height="240" fill="#7aab94" opacity="0.5"/>
    </svg>

    <div class="content">
      <p class="dept">기후에너지환경부 · 자연공원과</p>
      <p class="name">돌아와요</p>
      <div class="divider">
        <div class="contact-row">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#a8c9bb" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.18h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.16 6.16l1.02-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.02z"/>
          </svg>
          <span>010-5647-8547</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
